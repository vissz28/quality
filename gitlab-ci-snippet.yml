# ─────────────────────────────────────────────────────────────────────────────
# No changes to your .gitlab-ci.yml are required.
#
# The AI Test Generator is triggered automatically by GitLab pipeline events.
# Just configure ONE webhook in your project:
#
#   Settings → Webhooks → Add new webhook
#     URL:         https://<your-bot>.onrender.com/webhook/gitlab
#     Secret:      <same value as GITLAB_WEBHOOK_SECRET on the bot>
#     Triggers:    ✓ Merge request events
#                  ✓ Pipeline events
#
# Flow:
#   1. Developer pushes → MR webhook → AI Test Generator: ⏳ pending
#   2. Your CI pipeline runs (lint, test, build, ...)
#   3a. Pipeline passes  → pipeline event → bot generates tests → ✅ success + MR comment
#   3b. Pipeline fails   → pipeline event → bot sets ❌ failed  + MR comment
#
# To block merge until BOTH your pipeline AND AI tests pass:
#   Settings → Merge requests → "Pipelines must succeed" ✓
#   Settings → Merge requests → Required status checks → "AI Test Generator" ✓
# ─────────────────────────────────────────────────────────────────────────────
