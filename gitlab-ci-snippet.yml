# Add this job to the .gitlab-ci.yml of your TARGET project (SpritePinky or similar).
# It runs only when the webhook service commits an HTML report to the branch.
# The artifact appears as a "View Report" button in the MR pipeline.

publish-ai-test-report:
  stage: test
  image: alpine:latest
  rules:
    # Only run when the AI bot commits a report file
    - changes:
        - "test-reports/mr-*.html"
  script:
    - echo "AI-generated test report is ready as artifact"
    - ls -la test-reports/
  artifacts:
    name: "AI Test Report - MR !$CI_MERGE_REQUEST_IID"
    expose_as: "📊 AI Test Report"
    paths:
      - test-reports/
    when: always
    expire_in: 30 days
  # Don't block other jobs if this one isn't triggered
  allow_failure: true


