# ─────────────────────────────────────────────────────────────────────────────
# Add these jobs to your project's .gitlab-ci.yml.
#
# How it works:
#   Stage 1 (test): your normal pipeline — lint, test, build, etc.
#   Stage 2 (ai-test): runs ONLY if stage 1 passes. Triggers the AI bot,
#                      waits for the HTML report, and blocks merge until done.
#
# To block merge until both pipelines pass:
#   Settings → Merge requests → "Pipelines must succeed" ✓
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   AI_GENERATOR_URL   URL of the quality bot, e.g. https://mr-test-generator.onrender.com
#   AI_WEBHOOK_SECRET  Same value as GITLAB_WEBHOOK_SECRET on the bot
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - test        # ← your existing stages go here
  - ai-test     # ← runs only after ALL jobs in 'test' stage succeed

# ── AI Test Generator ─────────────────────────────────────────────────────────
#
# This job:
#   1. Triggers the AI bot (fails immediately if bot returns non-200)
#   2. Polls until the HTML report is committed to the branch (max 10 min)
#   3. Downloads the report and publishes it as a pipeline artifact
#
ai-test-generator:
  stage: ai-test
  image: alpine:3.19
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success    # only runs if all previous stages passed
  before_script:
    - apk add --no-cache curl jq

  script:
    # ── 1. Trigger the AI bot — fail immediately on non-200 ──────────────────
    - echo "→ Triggering AI Test Generator..."
    - |
      HTTP_STATUS=$(curl -s -o /tmp/bot_response.json -w "%{http_code}" \
        -X POST "$AI_GENERATOR_URL/webhook/gitlab" \
        -H "X-Gitlab-Token: $AI_WEBHOOK_SECRET" \
        -H "Content-Type: application/json" \
        -d "{
          \"object_kind\": \"merge_request\",
          \"project\": {
            \"id\": $CI_PROJECT_ID,
            \"web_url\": \"$CI_PROJECT_URL\"
          },
          \"object_attributes\": {
            \"iid\": $CI_MERGE_REQUEST_IID,
            \"title\": \"$CI_MERGE_REQUEST_TITLE\",
            \"description\": \"\",
            \"action\": \"update\",
            \"source_branch\": \"$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME\",
            \"target_branch\": \"$CI_MERGE_REQUEST_TARGET_BRANCH_NAME\",
            \"last_commit\": {\"id\": \"$CI_COMMIT_SHA\"},
            \"url\": \"$CI_PROJECT_URL/-/merge_requests/$CI_MERGE_REQUEST_IID\"
          },
          \"user\": {\"name\": \"$GITLAB_USER_LOGIN\"}
        }")
      echo "  Bot response: HTTP $HTTP_STATUS — $(cat /tmp/bot_response.json)"
      if [ "$HTTP_STATUS" != "200" ]; then
        echo "✗ Bot returned HTTP $HTTP_STATUS — aborting."
        exit 1
      fi
    - echo "✓ Bot accepted the request."

    # ── 2. Poll for the HTML report (max 10 min, every 20s) ─────────────────
    - echo "→ Waiting for AI report..."
    - REPORT_PATH="test-reports%2Fmr-${CI_MERGE_REQUEST_IID}-tests.html"
    - |
      for i in $(seq 1 30); do
        STATUS=$(curl -sf \
          --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/files/$REPORT_PATH?ref=$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" \
          | jq -r '.file_name // "not_found"' 2>/dev/null || echo "not_found")
        if [ "$STATUS" != "not_found" ]; then
          echo "✓ Report found after $((i * 20))s."
          break
        fi
        if [ "$i" -eq 30 ]; then
          echo "✗ Timed out after 10 minutes waiting for AI report."
          exit 1
        fi
        echo "  Attempt $i/30 — waiting 20s..."
        sleep 20
      done

    # ── 3. Download the HTML report ──────────────────────────────────────────
    - mkdir -p test-reports
    - |
      curl -sf \
        --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/files/$REPORT_PATH/raw?ref=$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" \
        -o "test-reports/mr-${CI_MERGE_REQUEST_IID}-tests.html"
    - echo "✓ Report downloaded."
    - echo "  Scenarios $(grep -c 'Scenario' test-reports/mr-${CI_MERGE_REQUEST_IID}-tests.html || echo 0)"
    - echo "  Tests     $(grep -c 'test(' test-reports/mr-${CI_MERGE_REQUEST_IID}-tests.html || echo 0)"

  artifacts:
    name: "AI Test Report — MR !$CI_MERGE_REQUEST_IID"
    expose_as: "📊 AI Test Report"
    paths:
      - test-reports/
    when: always
    expire_in: 30 days
